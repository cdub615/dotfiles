general {
    lock_cmd = omarchy-lock-screen                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                       # wait until screen is locked
}

# ===== BATTERY set (moderate) =====

# Screensaver — 5 min
listener {
    timeout = 300
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "0" ] && { pidof hyprlock || omarchy-launch-screensaver; }
}

# Lock — 10 min
listener {
    timeout = 600
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "0" ] && loginctl lock-session
}

# Keyboard backlight off — 12 min
listener {
    timeout = 720
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "0" ] && brightnessctl -sd '*::kbd_backlight' set 0
    on-resume  = brightnessctl -rd '*::kbd_backlight'
}

# Screen off (dpms) — 12 min
listener {
    timeout = 720
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "0" ] && hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on && brightnessctl -r
}

# Auto-suspend — 30 min (battery only)
listener {
    timeout = 1800
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "0" ] && systemctl suspend
}

# ===== AC set (more relaxed, never suspend) =====

# Screensaver — 15 min
listener {
    timeout = 900
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "1" ] && { pidof hyprlock || omarchy-launch-screensaver; }
}

# Lock — 30 min
listener {
    timeout = 1800
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "1" ] && loginctl lock-session
}

# Keyboard backlight off — 30 min
listener {
    timeout = 1800
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "1" ] && brightnessctl -sd '*::kbd_backlight' set 0
    on-resume  = brightnessctl -rd '*::kbd_backlight'
}

# Screen off (dpms) — 30 min
listener {
    timeout = 1800
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "1" ] && hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on && brightnessctl -r
}
